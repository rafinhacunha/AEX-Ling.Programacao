<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aventura dos Números — Jogo de Matemática</title>
<meta name="description" content="Jogo educativo de matemática para crianças em fase de alfabetização: contar, comparar e somar.">
<style>
  :root{
    --sky:#EAF6FF;
    --grass:#DDF2D8;
    --ink:#234060;
    --ink-soft:#C9D9E8;
    --leaf:#2BB673;
    --leaf-dark:#1E8F58;
    --sun:#FFC857;
    --coral:#FF7A66;
    --wrong:#C24B3F;
    --card:#FFFFFF;
    --shadow:0 10px 24px rgba(35,64,96,0.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:"Trebuchet MS","Segoe UI Rounded","Verdana",sans-serif;
    background:linear-gradient(to bottom, var(--sky) 0%, var(--sky) 68%, var(--grass) 68%, var(--grass) 100%);
    color:var(--ink);
  }
  .container{max-width:720px;margin:0 auto;padding:24px 16px 60px;}
  .screen{display:none;}
  .screen.active{display:block;}

  .hero{text-align:center;max-width:560px;margin:30px auto;padding:0 12px;}
  .eyebrow{text-transform:uppercase;letter-spacing:.12em;font-size:.85rem;color:var(--leaf-dark);font-weight:700;margin:0;}
  .hero h1{font-size:clamp(2rem,6vw,2.8rem);margin:10px 0;}
  .lead{font-size:1.15rem;opacity:.85;margin:0 auto 10px;max-width:480px;}
  .hero-icons{display:flex;justify-content:center;gap:14px;margin:24px 0;flex-wrap:wrap;}
  .hero-icons .icon{width:48px;height:48px;}

  .sound-toggle{display:flex;align-items:center;gap:8px;justify-content:center;margin:18px 0;font-size:1rem;}
  .sound-toggle input{width:20px;height:20px;}

  .btn-primary{background:var(--leaf);color:#fff;border:none;padding:16px 34px;border-radius:50px;font-size:1.2rem;font-weight:700;cursor:pointer;box-shadow:var(--shadow);margin-top:10px;font-family:inherit;}
  .btn-primary:hover{background:var(--leaf-dark);}
  .btn-primary:active{transform:translateY(1px);}

  .btn-secondary{background:var(--card);color:var(--ink);border:3px solid var(--ink-soft);padding:13px 30px;border-radius:50px;font-size:1.05rem;font-weight:700;cursor:pointer;box-shadow:var(--shadow);margin-top:10px;margin-left:10px;font-family:inherit;}
  .btn-secondary:hover{background:var(--sky);}
  .btn-secondary:active{transform:translateY(1px);}

  .end-actions{display:flex;justify-content:center;flex-wrap:wrap;gap:0;margin-top:6px;}

  .credit{margin-top:34px;font-size:.92rem;opacity:.75;}

  .stars{font-size:2rem;letter-spacing:.15em;margin:10px 0 4px;}

  .quiz-header{text-align:center;margin-bottom:8px;}
  .tree-wrap{width:180px;height:150px;margin:0 auto 4px;position:relative;}
  .canopy{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:170px;height:118px;
    background:radial-gradient(circle at 35% 30%, #3FCB85, #1E8F58 75%);
    border-radius:52% 48% 45% 45% / 58% 55% 45% 42%;
    box-shadow:var(--shadow);
  }
  .trunk{
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:24px;height:42px;background:#8a5a3b;border-radius:6px;
  }
  .apple-slot{
    position:absolute;width:17px;height:17px;border-radius:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,.3);
    border:2px solid rgba(255,255,255,.6);
  }
  .apple-slot.current{border-width:3px;border-color:#fff;}
  .apple-slot.filled-red{background:var(--coral);border-color:#fff;}
  .apple-slot.filled-gold{background:var(--sun);border-color:#fff;}

  .card{background:var(--card);border-radius:32px;padding:clamp(20px,4vw,38px);box-shadow:var(--shadow);max-width:640px;margin:14px auto;}
  .prompt-row{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
  #q-prompt{font-size:clamp(1.25rem,3vw,1.6rem);text-align:center;margin:0;}
  .speak-btn{font-size:1.5rem;background:var(--sun);border:none;border-radius:50%;width:50px;height:50px;cursor:pointer;box-shadow:var(--shadow);flex-shrink:0;font-family:inherit;}
  .speak-btn:hover{filter:brightness(0.97);}

  .stage{margin:16px 0;}

  .icon-cluster{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:8px;max-width:380px;margin:0 auto;}
  .icon-wrap{display:inline-block;}
  .icon-cluster .icon{width:46px;height:46px;display:block;}
  .icon-cluster.size-sm .icon{width:30px;height:30px;}
  .rot-0{transform:rotate(-6deg);}
  .rot-1{transform:rotate(5deg);}
  .rot-2{transform:rotate(-3deg);}
  .rot-3{transform:rotate(7deg);}
  .rot-4{transform:rotate(-8deg);}
  .rot-5{transform:rotate(3deg);}

  .add-row{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;}
  .op,.qmark{font-size:2.2rem;font-weight:800;}

  .match-number{
    font-size:4.4rem;font-weight:800;text-align:center;
    width:130px;height:130px;line-height:130px;
    background:#fff;border-radius:50%;margin:6px auto 18px;
    box-shadow:var(--shadow);border:4px solid var(--sun);
  }

  .options{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:22px;}
  .opt-btn{font-family:inherit;background:var(--card);border:3px solid var(--ink-soft);box-shadow:var(--shadow);cursor:pointer;color:var(--ink);}
  .opt-btn:hover{transform:translateY(-3px);}
  .opt-btn:active{transform:translateY(0);}
  .opt-btn:disabled{opacity:.55;cursor:default;transform:none;}
  .numeral-btn{width:80px;height:80px;border-radius:50%;font-size:2.1rem;font-weight:700;}
  .match-btn{padding:14px 16px;border-radius:22px;display:flex;flex-direction:column;align-items:center;}

  .compare-row{display:flex;gap:18px;justify-content:center;margin-top:8px;flex-wrap:wrap;}
  .compare-box{flex:1 1 160px;max-width:220px;display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px;border-radius:24px;background:var(--card);border:3px solid var(--ink-soft);box-shadow:var(--shadow);cursor:pointer;font-family:inherit;}
  .compare-box:hover{transform:translateY(-3px);}
  .compare-box:disabled{opacity:.55;cursor:default;transform:none;}
  .compare-label{font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.05em;font-size:.92rem;}

  .feedback{min-height:1.6em;text-align:center;font-weight:700;font-size:1.12rem;margin-top:18px;}
  .feedback.good{color:var(--leaf-dark);}
  .feedback.bad{color:var(--wrong);}

  button:focus-visible{outline:3px solid var(--ink);outline-offset:3px;}

  @keyframes shake{
    10%,90%{transform:translateX(-4px);}
    20%,80%{transform:translateX(6px);}
    30%,50%,70%{transform:translateX(-8px);}
    40%,60%{transform:translateX(8px);}
  }
  .shake{animation:shake .45s;}

  @media (prefers-reduced-motion: reduce){
    .shake{animation:none !important;}
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div class="container">

  <section id="screen-start" class="screen active">
    <div class="hero">
      <p class="eyebrow">Matemática para pequenos exploradores</p>
      <h1>Aventura dos Números</h1>
      <p class="lead">Conte, compare e some para ajudar a árvore a ficar cheia de maçãs! 🍎</p>
      <div class="hero-icons" id="hero-icons"></div>
      <label class="sound-toggle" id="sound-toggle-wrap">
        <input type="checkbox" id="sound-toggle" checked>
        Ouvir as perguntas em voz alta 🔊
      </label>
      <button class="btn-primary" id="btn-start">Começar a aventura</button>
      <p class="credit">Criado por: <strong>Rafael Cunha e Marcelo Freitas</strong></p>
    </div>
  </section>

  <section id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div class="tree-wrap">
        <div class="canopy"><div id="tree-slots"></div></div>
        <div class="trunk"></div>
      </div>
      <p class="eyebrow" id="q-counter">Questão 1 de 8</p>
    </div>

    <div class="card">
      <div class="prompt-row">
        <h2 id="q-prompt">Pergunta</h2>
        <button class="speak-btn" id="replay-btn" aria-label="Ouvir a pergunta novamente">🔊</button>
      </div>
      <div class="stage" id="quiz-stage"></div>
      <div id="quiz-options"></div>
      <p class="feedback" id="feedback" aria-live="polite"></p>
    </div>
  </section>

  <section id="screen-end" class="screen">
    <div class="hero">
      <h1>Parabéns! 🎉</h1>
      <p class="lead" id="final-message"></p>
      <p class="stars" id="final-stars"></p>
      <div class="end-actions">
        <button class="btn-primary" id="btn-restart">Jogar novamente</button>
        <button class="btn-secondary" id="btn-menu">Voltar ao menu</button>
      </div>
    </div>
  </section>

</div>

<script>
  function iconSVG(type, color){
    switch(type){
      case 'apple':
        return '<svg viewBox="0 0 48 48" class="icon" aria-hidden="true"><path d="M24 16c-7.5 0-13 6.2-13 14.5C11 38.5 17 44 24 44s13-5.5 13-13.5C37 22.2 31.5 16 24 16z" fill="'+color+'"/><path d="M24 16c0-4.5 2-8 5.5-10.5" stroke="#6b4a33" stroke-width="2.2" fill="none" stroke-linecap="round"/><ellipse cx="19" cy="9" rx="5" ry="3" fill="#2BB673" transform="rotate(-25 19 9)"/></svg>';
      case 'balloon':
        return '<svg viewBox="0 0 48 64" class="icon" aria-hidden="true"><ellipse cx="24" cy="24" rx="17" ry="21" fill="'+color+'"/><polygon points="19,43 29,43 24,50" fill="'+color+'"/><path d="M24 50 Q20 56 24 62" stroke="#8a7a68" stroke-width="2" fill="none"/></svg>';
      case 'star':
        return '<svg viewBox="0 0 48 48" class="icon" aria-hidden="true"><polygon points="24,4 30,18 45,19 33,29 37,44 24,35 11,44 15,29 3,19 18,18" fill="'+color+'"/></svg>';
      case 'fish':
        return '<svg viewBox="0 0 60 36" class="icon" aria-hidden="true"><ellipse cx="24" cy="18" rx="21" ry="13" fill="'+color+'"/><polygon points="44,18 59,6 59,30" fill="'+color+'"/><circle cx="13" cy="14" r="2.6" fill="#1f3349"/></svg>';
      case 'flower':
        return '<svg viewBox="0 0 48 48" class="icon" aria-hidden="true"><g fill="'+color+'"><circle cx="24" cy="13" r="8.5"/><circle cx="24" cy="35" r="8.5"/><circle cx="13" cy="24" r="8.5"/><circle cx="35" cy="24" r="8.5"/></g><circle cx="24" cy="24" r="7" fill="#FFC857"/></svg>';
      case 'dot':
        return '<svg viewBox="0 0 48 48" class="icon dot" aria-hidden="true"><circle cx="24" cy="24" r="17" fill="'+color+'"/></svg>';
    }
    return '';
  }

  function renderCluster(type, color, count, size){
    var html = '';
    for(var i=0;i<count;i++){
      html += '<span class="icon-wrap rot-'+(i%6)+'">'+iconSVG(type,color)+'</span>';
    }
    return '<div class="icon-cluster'+(size==='sm' ? ' size-sm' : '')+'">'+html+'</div>';
  }

  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var t=a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }

  var questions = [
    {type:'count', icon:'apple', color:'#FF7A66', count:4,
     prompt:'Quantas maçãs tem na cesta?', options:[3,4,5]},

    {type:'count', icon:'balloon', color:'#6FA8DC', count:6,
     prompt:'Quantos balões estão voando?', options:[5,6,7]},

    {type:'match', number:7, color:'#2BB673', optionCounts:[5,7,9],
     prompt:'Qual grupo tem 7 bolinhas? Toque no grupo certo.'},

    {type:'compare', iconA:'star', colorA:'#FFC857', countA:3,
     iconB:'star', colorB:'#FFC857', countB:5, correct:'B',
     prompt:'Qual grupo tem mais estrelas? Toque nele.'},

    {type:'add', iconLeft:'fish', colorLeft:'#4FB6C9', leftCount:2, rightCount:3,
     prompt:'Quantos peixinhos tem ao todo?', options:[4,5,6]},

    {type:'count', icon:'flower', color:'#E26FAA', count:8,
     prompt:'Quantas flores tem no jardim?', options:[7,8,9]},

    {type:'match', number:3, color:'#9B6FE0', optionCounts:[2,3,4],
     prompt:'Qual grupo tem 3 bolinhas? Toque no grupo certo.'},

    {type:'add', iconLeft:'balloon', colorLeft:'#FF7A66', leftCount:4, rightCount:2,
     prompt:'Quantos balões tem ao todo?', options:[5,6,7]}
  ];

  questions.forEach(function(q){
    if(q.type==='count') q.correctValue = q.count;
    else if(q.type==='add') q.correctValue = q.leftCount + q.rightCount;
    else if(q.type==='match') q.correctValue = q.number;
    else if(q.type==='compare') q.correctValue = q.correct;
  });

  var treePositions = [
    {left:'15%',top:'15%'}, {left:'45%',top:'5%'}, {left:'75%',top:'15%'},
    {left:'8%', top:'45%'}, {left:'38%',top:'42%'}, {left:'68%',top:'48%'},
    {left:'25%',top:'75%'}, {left:'58%',top:'78%'}
  ];

  var currentIndex = 0;
  var history = [];
  var wrongAttempted = false;
  var soundOn = true;

  function optionButtonsNumeral(values){
    var ordered = shuffle(values);
    var html = '<div class="options">';
    ordered.forEach(function(v){
      html += '<button class="opt-btn numeral-btn" data-value="'+v+'">'+v+'</button>';
    });
    return html + '</div>';
  }

  function optionButtonsMatch(counts, color){
    var ordered = shuffle(counts);
    var html = '<div class="options">';
    ordered.forEach(function(c){
      html += '<button class="opt-btn match-btn" data-value="'+c+'">'+renderCluster('dot', color, c, 'sm')+'</button>';
    });
    return html + '</div>';
  }

  function renderCompare(q){
    return '<div class="compare-row">'+
      '<button class="compare-box" data-value="A"><span class="compare-label">Grupo A</span>'+renderCluster(q.iconA,q.colorA,q.countA)+'</button>'+
      '<button class="compare-box" data-value="B"><span class="compare-label">Grupo B</span>'+renderCluster(q.iconB,q.colorB,q.countB)+'</button>'+
      '</div>';
  }

  function renderTreeSlots(){
    var container = document.getElementById('tree-slots');
    container.innerHTML = questions.map(function(q,i){
      return '<div class="apple-slot" data-index="'+i+'" style="left:'+treePositions[i].left+';top:'+treePositions[i].top+'"></div>';
    }).join('');
  }

  function updateTreeUI(){
    var slots = document.querySelectorAll('.apple-slot');
    slots.forEach(function(el, i){
      el.classList.remove('current','filled-red','filled-gold');
      if(history[i]==='first') el.classList.add('filled-red');
      else if(history[i]==='retry') el.classList.add('filled-gold');
      else if(i===currentIndex) el.classList.add('current');
    });
  }
  function showScreen(id){
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  function startGame(){
    currentIndex = 0;
    history = [];
    renderTreeSlots();
    showScreen('screen-quiz');
    renderQuestion();
  }

  function goToMenu(){
    if('speechSynthesis' in window) window.speechSynthesis.cancel();
    showScreen('screen-start');
  }

  function renderQuestion(){
    wrongAttempted = false;
    var q = questions[currentIndex];

    document.getElementById('q-counter').textContent = 'Questão '+(currentIndex+1)+' de '+questions.length;
    document.getElementById('q-prompt').textContent = q.prompt;
    var fb = document.getElementById('feedback');
    fb.textContent = '';
    fb.className = 'feedback';

    var stageHTML = '', optionsHTML = '';
    if(q.type === 'count'){
      stageHTML = renderCluster(q.icon, q.color, q.count);
      optionsHTML = optionButtonsNumeral(q.options);
    } else if(q.type === 'add'){
      stageHTML = '<div class="add-row">'+
        renderCluster(q.iconLeft, q.colorLeft, q.leftCount, 'sm')+
        '<span class="op">+</span>'+
        renderCluster(q.iconLeft, q.colorLeft, q.rightCount, 'sm')+
        '<span class="op">=</span><span class="qmark">?</span></div>';
      optionsHTML = optionButtonsNumeral(q.options);
    } else if(q.type === 'match'){
      stageHTML = '<div class="match-number">'+q.number+'</div>';
      optionsHTML = optionButtonsMatch(q.optionCounts, q.color);
    } else if(q.type === 'compare'){
      stageHTML = '';
      optionsHTML = renderCompare(q);
    }

    document.getElementById('quiz-stage').innerHTML = stageHTML;
    document.getElementById('quiz-options').innerHTML = optionsHTML;
    attachOptionListeners();
    updateTreeUI();
    if(soundOn) speak(q.prompt);
  }

  function attachOptionListeners(){
    var btns = document.querySelectorAll('.opt-btn, .compare-box');
    btns.forEach(function(btn){
      btn.addEventListener('click', function(){ handleAnswer(btn.dataset.value, btn); });
    });
  }

  function handleAnswer(value, btnEl){
    var q = questions[currentIndex];
    var isCorrect = String(value) === String(q.correctValue);
    var fb = document.getElementById('feedback');

    if(isCorrect){
      fb.textContent = wrongAttempted ? 'Isso! Você conseguiu! 🎉' : 'Muito bem! Resposta certa! 🌟';
      fb.className = 'feedback good';
      history[currentIndex] = wrongAttempted ? 'retry' : 'first';
      document.querySelectorAll('.opt-btn, .compare-box').forEach(function(b){ b.disabled = true; });
      updateTreeUI();
      setTimeout(function(){
        if(currentIndex < questions.length - 1){
          currentIndex++;
          renderQuestion();
        } else {
          finishGame();
        }
      }, 1300);
    } else {
      wrongAttempted = true;
      fb.textContent = 'Quase! Toque em outra opção e tente de novo. 💛';
      fb.className = 'feedback bad';
      btnEl.classList.add('shake');
      setTimeout(function(){ btnEl.classList.remove('shake'); }, 500);
    }
  }

  function finishGame(){
    var firstCount = history.filter(function(h){ return h === 'first'; }).length;
    var total = questions.length;
    document.getElementById('final-stars').textContent =
      '⭐'.repeat(firstCount) + '✨'.repeat(total - firstCount);
    document.getElementById('final-message').textContent =
      'Você completou a Aventura dos Números! Resolveu todas as '+total+' questões e acertou '+firstCount+' de primeira. 🎉';
    showScreen('screen-end');
  }

  function speak(text){
    if(!soundOn || !('speechSynthesis' in window)) return;
    try{
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'pt-BR';
      u.rate = 0.92;
      window.speechSynthesis.speak(u);
    }catch(e){ 
  }

  document.addEventListener('DOMContentLoaded', function(){
    var heroColors = ['#FF7A66','#6FA8DC','#FFC857','#4FB6C9','#E26FAA'];
    var heroTypes = ['apple','balloon','star','fish','flower'];
    document.getElementById('hero-icons').innerHTML = heroTypes.map(function(t,i){
      return '<span class="icon-wrap rot-'+(i%6)+'">'+iconSVG(t, heroColors[i])+'</span>';
    }).join('');

    if(!('speechSynthesis' in window)){
      document.getElementById('sound-toggle-wrap').style.display = 'none';
      document.getElementById('replay-btn').style.display = 'none';
      soundOn = false;
    }

    document.getElementById('btn-start').addEventListener('click', startGame);
    document.getElementById('btn-restart').addEventListener('click', startGame);
    document.getElementById('btn-menu').addEventListener('click', goToMenu);
    document.getElementById('sound-toggle').addEventListener('change', function(e){
      soundOn = e.target.checked;
    });
    document.getElementById('replay-btn').addEventListener('click', function(){
      speak(questions[currentIndex].prompt);
    });
  });
</script>
</body>
</html>
